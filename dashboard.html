<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDS 111 Attendance - Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="dashboard-header">
            <div>
                <h1 style="margin: 0; text-align: left; font-size: 24px;">Dashboard</h1>
                <p id="userInfo" style="color: #999; margin: 5px 0 0 0; font-size: 14px;"></p>
            </div>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>

        <!-- Student Dashboard -->
        <div id="studentView" style="display: none;">
            <div class="session-control">
                <h3>Mark Attendance</h3>
                <form id="attendanceForm" onsubmit="markAttendance(event)">
                    <div class="form-group">
                        <label for="sessionToken">Session Token</label>
                        <input id="sessionToken" name="sessionToken" type="text" placeholder="Enter token from admin" required>
                    </div>
                    <button type="submit">Mark Attendance</button>
                </form>
            </div>

            <div class="session-control">
                <h3>Your Attendance History</h3>
                <div id="attendanceHistory" class="attendance-list"></div>
            </div>
        </div>

        <!-- Admin Dashboard -->
        <div id="adminView" style="display: none;">
            <div class="session-control">
                <h3>Session Control</h3>
                <div class="form-group">
                    <label for="sessionDuration">Attendance Validity (minutes):</label>
                    <input id="sessionDuration" type="number" value="30" min="1" max="120" style="width: 80px;">
                </div>
                <div id="sessionStatus"></div>
                <button id="startBtn" onclick="startSession()">Start Attendance Session</button>
                <button id="endBtn" onclick="endSession()" style="display: none; background: #f44;">End Session</button>
            </div>

            <div id="qrSection" style="display: none;">
                <div class="session-control">
                    <h3>QR Code</h3>
                    <div class="qr-display">
                        <img id="qrCode" src="" alt="QR Code" style="max-width: 300px; margin: 0 auto; display: block;">
                    </div>
                </div>
            </div>

            <div class="session-control">
                <h3>Live Attendance (<span id="attendanceCount">0</span>)</h3>
                <div class="attendance-list" id="attendanceList"></div>
                <button id="downloadAttendanceBtn" style="margin-top:10px;">Download Attendance CSV</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-database-compat.js"></script>
    <!-- QRCode script must be loaded BEFORE dashboard logic -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="auth.js"></script>
    <script>
        let currentUser = null;
        let currentSession = null;

        // Check auth state
        firebase.auth().onAuthStateChanged(async user => {
            if (!user) {
                window.location.href = 'login';
                return;
            }

            currentUser = user;
            const db = firebase.database();
            const userRef = db.ref(`users/${user.uid}`);
            const snapshot = await userRef.once('value');
            const userData = snapshot.val();

            document.getElementById('userInfo').textContent = 
                (userData?.role === 'admin' ? 'Admin' : 'Student') + ' - ' + (userData?.name || user.email);

            if (userData?.role === 'admin') {
                document.getElementById('studentView').style.display = 'none';
                document.getElementById('adminView').style.display = 'block';
                loadAdminDashboard();
            } else {
                document.getElementById('adminView').style.display = 'none';
                document.getElementById('studentView').style.display = 'block';
                loadStudentDashboard();
            }
        });

        async function loadStudentDashboard() {
            try {
                const db = firebase.database();
                const attendanceRef = db.ref('attendance');
                const snapshot = await attendanceRef.once('value');
                const allAttendance = snapshot.val() || {};

                const history = [];
                Object.values(allAttendance).forEach(session => {
                    if (session && session[currentUser.uid]) {
                        const record = session[currentUser.uid];
                        history.push({
                            date: new Date(record.timestamp).toLocaleDateString(),
                            time: new Date(record.timestamp).toLocaleTimeString()
                        });
                    }
                });

                const historyDiv = document.getElementById('attendanceHistory');
                historyDiv.innerHTML = history.length > 0 
                    ? history.map(h => `<div class="attendance-item">✓ ${h.date} at ${h.time}</div>`).join('')
                    : '<p style="color: #999;">No attendance records yet</p>';
            } catch (error) {
                console.error('Error loading history:', error);
            }
        }

        async function markAttendance(event) {
            event.preventDefault();
            const token = document.getElementById('sessionToken').value.trim();

            // Check if geolocation is available
            if (!navigator.geolocation) {
                alert('Geolocation is not supported by your browser. Attendance cannot be marked.');
                return;
            }

            // Get user location
            navigator.geolocation.getCurrentPosition(async (position) => {
                // Maximum distance in meters (extended to 50km)
                const maxDistance = 50000;
                try {
                    const db = firebase.database();
                    const sessionsRef = db.ref('sessions');
                    const snapshot = await sessionsRef.once('value');
                    const sessions = snapshot.val() || {};

                    let session = null;
                    let sessionId = null;
                    for (const [id, s] of Object.entries(sessions)) {
                        if (s && s.token === token && s.active) {
                            session = s;
                            sessionId = id;
                            break;
                        }
                    }

                    if (!session) {
                        alert('Invalid or inactive session token');
                        return;
                    }

                    // Check distance from admin
                    if (session.adminLat && session.adminLng) {
                        const distance = getDistance(
                            position.coords.latitude, position.coords.longitude,
                            session.adminLat, session.adminLng
                        );
                        if (distance > maxDistance) {
                            alert(`You are too far from the admin (${Math.round(distance)}m). Must be within ${maxDistance}m.`);
                            return;
                        }
                    }

                    // Check if already marked attendance for this session
                    const existingAttendance = await db.ref(`attendance/${sessionId}/${currentUser.uid}`).once('value');
                    if (existingAttendance.exists()) {
                        alert('You have already marked attendance for this session!');
                        return;
                    }

                    // Get device fingerprint
                    const deviceId = getDeviceFingerprint();

                    // Check if this device already marked attendance (prevent device fraud)
                    const deviceAttendanceRef = db.ref('attendance/' + sessionId);
                    const allAttendance = await deviceAttendanceRef.once('value');
                    for (const [uid, record] of Object.entries(allAttendance.val() || {})) {
                        if (record.deviceId === deviceId && uid !== currentUser.uid) {
                            alert('This device has already been used to mark attendance by another user.');
                            return;
                        }
                    }

                    await db.ref(`attendance/${sessionId}/${currentUser.uid}`).set({
                        timestamp: Date.now(),
                        deviceId: deviceId,
                        lat: position.coords.latitude,
                        lng: position.coords.longitude,
                        ip: null // Note: IP requires server-side capture
                    });

                    alert('✓ Attendance marked!');
                    document.getElementById('sessionToken').value = '';
                    loadStudentDashboard();
                } catch (error) {
                    alert('Error: ' + error.message);
                }
            }, (error) => {
                alert('Location error: ' + error.message + '. Please enable location access to mark attendance.');
            });
        }

        async function loadAdminDashboard() {
            try {
                const db = firebase.database();
                const sessionsRef = db.ref('sessions');
                const snapshot = await sessionsRef.once('value');
                const sessions = snapshot.val() || {};

                const activeSessions = Object.entries(sessions).find(([_, s]) => s && s.active);
                if (activeSessions) {
                    currentSession = { id: activeSessions[0], ...activeSessions[1] };
                    displaySessionStatus();
                    loadLiveAttendance();
                    startAttendancePolling();
                    // Enable download button
                    document.getElementById('downloadAttendanceBtn').onclick = downloadAttendanceCSV;
                } else {
                    displayNoSession();
                }
            } catch (error) {
                console.error('Error loading admin dashboard:', error);
            }
        }

        // Download attendance as CSV
        async function downloadAttendanceCSV() {
            try {
                const db = firebase.database();
                const attendanceRef = db.ref('attendance/' + currentSession.id);
                const snapshot = await attendanceRef.once('value');
                const attendance = snapshot.val() || {};
                let csv = 'Matric No,Name,Department,Email,Timestamp,Latitude,Longitude\n';
                for (const [uid, record] of Object.entries(attendance)) {
                    // Fetch user info
                    const userSnap = await db.ref('users/' + uid).once('value');
                    const user = userSnap.val() || {};
                    const timestamp = record.timestamp ? new Date(record.timestamp).toLocaleString() : '';
                    csv += `${user.matricNo || ''},${user.name || ''},${user.department || ''},${user.email || ''},${timestamp},${record.lat || ''},${record.lng || ''}\n`;
                }
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `attendance_${currentSession.token}.csv`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (err) {
                alert('Failed to download attendance: ' + err.message);
            }
        }

        function displaySessionStatus() {
            const statusDiv = document.getElementById('sessionStatus');
            statusDiv.innerHTML = `<div class="session-status">✓ Session Active | Token: <strong>${currentSession.token}</strong></div>`;

            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('endBtn').style.display = 'block';
            document.getElementById('qrSection').style.display = 'block';

            // QR code now encodes only the session token
            const qrToken = currentSession.token;
            if (typeof QRCode !== 'undefined') {
                QRCode.toDataURL(qrToken, (err, url) => {
                    if (err) {
                        console.error('QR Code generation error:', err, 'Token:', qrToken);
                        document.getElementById('qrCode').alt = 'QR generation failed';
                    } else {
                        document.getElementById('qrCode').src = url;
                        document.getElementById('qrCode').alt = 'QR Code';
                    }
                });
            } else {
                document.getElementById('qrCode').alt = 'QR Code library not loaded';
                console.error('QRCode.js is not loaded!');
            }
        }

        function displayNoSession() {
            const statusDiv = document.getElementById('sessionStatus');
            statusDiv.innerHTML = '<p style="color: #999;">No active session</p>';
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('endBtn').style.display = 'none';
            document.getElementById('qrSection').style.display = 'none';
        }

        // Get admin's location when starting session
        async function startSession() {
            if (!navigator.geolocation) {
                alert('Geolocation is not supported. Cannot start session.');
                return;
            }

            navigator.geolocation.getCurrentPosition(async (position) => {
                try {
                    const db = firebase.database();
                    const token = Math.random().toString(36).substring(2, 11);
                    const startTime = Date.now();
                    const durationMinutes = parseInt(document.getElementById('sessionDuration').value) || 30;
                    const endTime = startTime + (durationMinutes * 60 * 1000);

                    // Get device fingerprint
                    const deviceId = getDeviceFingerprint();

                    const newSessionRef = db.ref('sessions').push();
                    await newSessionRef.set({
                        token: token,
                        startTime: startTime,
                        endTime: endTime,
                        active: true,
                        // Save admin's location
                        adminLat: position.coords.latitude,
                        adminLng: position.coords.longitude,
                        // Device info
                        adminDeviceId: deviceId
                    });

                    currentSession = { id: newSessionRef.key, token, startTime, endTime, active: true };
                    displaySessionStatus();
                    startAttendancePolling();
                    alert(`Session started! Valid for ${durationMinutes} minutes. Your location is saved.`);
                } catch (error) {
                    alert('Error starting session: ' + error.message);
                }
            }, (error) => {
                alert('Location error: ' + error.message + '. Please enable location to start session.');
            });
        }

        // Calculate distance between two coordinates (in meters)
        function getDistance(lat1, lng1, lat2, lng2) {
            const R = 6371000; // Earth's radius in meters
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLng/2) * Math.sin(dLng/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // Get device fingerprint
        function getDeviceFingerprint() {
            const nav = navigator.userAgent;
            const screenSize = `${window.screen.width}x${window.screen.height}`;
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            const language = navigator.language;
            const platform = navigator.platform;
            // Simple hash of device info
            const info = `${nav}|${screenSize}|${timezone}|${language}|${platform}`;
            let hash = 0;
            for (let i = 0; i < info.length; i++) {
                const char = info.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return 'device_' + Math.abs(hash).toString(16);
        }

        async function endSession() {
            try {
                const db = firebase.database();
                await db.ref(`sessions/${currentSession.id}`).update({ active: false });
                currentSession = null;
                displayNoSession();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        function startAttendancePolling() {
            const interval = setInterval(() => {
                if (!currentSession || !currentSession.active) {
                    clearInterval(interval);
                    return;
                }
                loadLiveAttendance();
            }, 2000);
        }

        async function loadLiveAttendance() {
            if (!currentSession) return;

            try {
                const db = firebase.database();
                const attendanceRef = db.ref(`attendance/${currentSession.id}`);
                const snapshot = await attendanceRef.once('value');
                const attendance = snapshot.val() || {};

                const list = document.getElementById('attendanceList');
                const items = Object.entries(attendance).map(([uid, record]) => {
                    const date = new Date(record.timestamp);
                    const isLate = record.timestamp > (currentSession.startTime + 5 * 60 * 1000);
                    return `<div class="attendance-item ${isLate ? 'late' : ''}">
                        ✓ ${uid.substring(0, 8)}... | ${date.toLocaleTimeString()}
                    </div>`;
                });

                document.getElementById('attendanceCount').textContent = items.length;
                list.innerHTML = items.length > 0 ? items.join('') : '<p style="color: #999;">Waiting for attendance...</p>';
            } catch (error) {
                console.error('Error loading attendance:', error);
            }
        }

        async function handleLogout() {
            try {
                await firebase.auth().signOut();
                window.location.href = 'login';
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
    </script>
</body>
</html>
