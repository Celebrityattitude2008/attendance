<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDS 111 Attendance - Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
        .skeleton-text { height: 16px; margin-bottom: 8px; }
        .skeleton-box { height: 100px; margin-bottom: 10px; }
        .skeleton-btn { height: 40px; width: 120px; display: inline-block; margin-right: 10px; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
        .fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
        .slide-in { animation: slideIn 0.4s ease-out forwards; }
        .pulse { animation: pulse 2s infinite; }
        #map { height: 350px; width: 100%; border-radius: 10px; margin-top: 15px; }
        .map-legend { display: flex; gap: 15px; margin-top: 10px; font-size: 13px; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
        .legend-dot.admin { background: #e74c3c; }
        .legend-dot.user { background: #3498db; }
        @media (max-width: 600px) {
            .container { padding: 20px; margin: 10px; }
            .dashboard-header { flex-direction: column; align-items: flex-start; gap: 10px; }
            .dashboard-header h1 { font-size: 20px !important; }
            .logout-btn { width: 100%; }
            .session-control { padding: 15px; }
            .department-card { min-width: 100% !important; max-width: 100% !important; }
            #map { height: 250px; }
            .map-legend { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="dashboard-header fade-in-up">
            <div>
                <h1 style="margin: 0; text-align: left; font-size: 24px;">Dashboard</h1>
                <p id="userInfo" style="color: #999; margin: 5px 0 0 0; font-size: 14px;"></p>
            </div>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>

        <!-- Skeleton Loader -->
        <div id="skeletonLoader" class="skeleton-loader">
            <div class="skeleton skeleton-text" style="width: 60%;"></div>
            <div class="skeleton skeleton-text" style="width: 40%;"></div>
            <div class="skeleton skeleton-box"></div>
        </div>

        <!-- Main Content (hidden until loaded) -->
        <div id="mainContent" style="display: none;">

        <!-- Student Dashboard -->
        <div id="studentView" style="display: none;">
            <div class="session-control fade-in-up" style="animation-delay: 0.1s;">
                <h3>Mark Attendance</h3>
                <form id="attendanceForm" onsubmit="markAttendance(event)">
                    <div class="form-group">
                        <label for="sessionToken">Session Token</label>
                        <input id="sessionToken" name="sessionToken" type="text" placeholder="Enter token from admin" required>
                    </div>
                    <button type="submit">Mark Attendance</button>
                </form>
            </div>

            <div class="session-control fade-in-up" style="animation-delay: 0.2s;">
                <h3>Your Attendance History</h3>
                <div id="attendanceHistory" class="attendance-list"></div>
                <button id="downloadMyAttendanceBtn" style="margin-top:10px; background:#43a047;">Download My Attendance</button>
            </div>
        </div>

        <!-- Admin Dashboard -->
        <div id="adminView" style="display: none;">
            <div class="session-control fade-in-up" style="animation-delay: 0.1s;">
                <h3>Session Control</h3>
                <div class="form-group">
                    <label for="sessionDuration">Attendance Validity (minutes):</label>
                    <input id="sessionDuration" type="number" value="30" min="1" max="120" style="width: 80px;">
                </div>
                <div id="sessionStatus"></div>
                <button id="startBtn" onclick="startSession()">Start Attendance Session</button>
                <button id="endBtn" onclick="endSession()" style="display: none; background: #f44;">End Session</button>
            </div>

            <div id="qrSection" style="display: none;">
                <div class="session-control fade-in-up" style="animation-delay: 0.15s;">
                    <h3>QR Code</h3>
                    <div class="qr-display">
                        <img id="qrCode" src="" alt="QR Code" style="max-width: 300px; margin: 0 auto; display: block;">
                    </div>
                </div>
            </div>

            <!-- Live Map Section -->
            <div class="session-control fade-in-up" style="animation-delay: 0.2s;">
                <h3>📍 Live Location Map</h3>
                <div id="map"></div>
                <div class="map-legend">
                    <div class="legend-item"><span class="legend-dot admin"></span> Admin Location</div>
                    <div class="legend-item"><span class="legend-dot user"></span> User Locations</div>
                </div>
            </div>

            <div class="session-control fade-in-up" style="animation-delay: 0.25s;">
                <h3>Live Attendance (<span id="attendanceCount">0</span>)</h3>
                <div class="attendance-list" id="attendanceList"></div>
                <button id="downloadAttendanceBtn" style="margin-top:10px;">Download Current Session CSV</button>
                <button id="downloadAllAttendanceBtn" style="margin-top:10px; margin-left:10px; background:#43a047;">Download All Attendance CSV</button>
            </div>

            <!-- Department Attendance Section (Lazy Loaded) -->
            <div class="session-control fade-in-up" style="animation-delay: 0.3s;">
                <h3>View Total Attendance by Department</h3>
                <div id="departmentAttendanceCards" class="department-cards" style="display: flex; flex-wrap: wrap; gap: 20px;">
                    <div class="skeleton skeleton-text" style="width: 200px;"></div>
                </div>
            </div>


            <!-- Modal for Department Attendance Table -->
            <div id="departmentAttendanceModal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.7); align-items:center; justify-content:center; z-index:1000;">
                <div class="modal-content slide-in" style="background:#222; color:#fff; padding:30px; border-radius:10px; min-width:350px; max-width:90vw; max-height:90vh; overflow:auto; position:relative;">
                    <button onclick="closeDepartmentAttendanceModal()" style="position:absolute; top:10px; right:10px; background:#f44; color:#fff; border:none; border-radius:4px; padding:4px 10px; cursor:pointer;">Close</button>
                    <h3 id="modalDepartmentTitle"></h3>
                    <div id="departmentAttendanceTable"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-messaging-compat.js"></script>
    <!-- QRCode library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="auth.js"></script>
    <script>
        let currentUser = null;
        let currentSession = null;
        let map = null;
        let userMarkers = {};
        let adminMarker = null;
        let messaging = null;

        async function initNotifications() {
            try {
                if (typeof firebase.messaging !== 'undefined') {
                    messaging = firebase.messaging();
                    
                    const permission = await Notification.requestPermission();
                    if (permission === 'granted') {
                        console.log('Notification permission granted');
                        
                        const token = await messaging.getToken({
                            vapidKey: 'BEl62iUYgUivxIkv69yViEuiBIa-Ib9-SkvMeAtA3LFgDzkrxZJjSgSnfckjBJuBkr3qBUYIHBQFLXYp5Nksh8U'
                        });
                        console.log('FCM Token:', token);
                        
                        if (currentUser) {
                            const db = firebase.database();
                            await db.ref(`users/${currentUser.uid}/fcmToken`).set(token);
                        }
                        
                        // Handle incoming messages
                        messaging.onMessage((payload) => {
                            console.log('Foreground message received:', payload);
                            showNotification(payload);
                        });
                        
                        // Schedule weekly Friday notification
                        scheduleFridayNotification();
                    } else {
                        console.log('Notification permission denied');
                    }
                }
            } catch (error) {
                console.error('Error initializing notifications:', error);
            }
        }

        // Show notification in the app
        function showNotification(payload) {
            const title = payload.notification?.title || 'Attendance Reminder';
            const body = payload.notification?.body || 'Time to check your attendance!';
            
            // Create a custom notification UI element
            const notificationDiv = document.createElement('div');
            notificationDiv.id = 'appNotification';
            notificationDiv.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                padding: 20px 25px;
                border-radius: 12px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.3);
                z-index: 10000;
                max-width: 350px;
                animation: slideInRight 0.3s ease-out;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            `;
            notificationDiv.innerHTML = `
                <div style="font-weight: bold; font-size: 16px; margin-bottom: 8px;">🔔 ${title}</div>
                <div style="font-size: 14px; opacity: 0.9;">${body}</div>
                <button onclick="this.parentElement.remove()" style="
                    margin-top: 12px;
                    background: rgba(255,255,255,0.2);
                    border: none;
                    color: white;
                    padding: 8px 16px;
                    border-radius: 6px;
                    cursor: pointer;
                    font-size: 13px;
                ">Dismiss</button>
            `;
            document.body.appendChild(notificationDiv);
            
            // Auto-remove after 10 seconds
            setTimeout(() => {
                if (notificationDiv.parentElement) {
                    notificationDiv.remove();
                }
            }, 10000);
        }

        // Schedule notification for Friday at 12:00 noon
        function scheduleFridayNotification() {
            // Check every minute if it's Friday at 12:00
            setInterval(() => {
                const now = new Date();
                const dayOfWeek = now.getDay(); // 0 = Sunday, 5 = Friday
                const hours = now.getHours();
                const minutes = now.getMinutes();
                
                // Check if it's Friday (day 5) and time is 12:00 PM
                if (dayOfWeek === 5 && hours === 12 && minutes === 0) {
                    showNotification({
                        notification: {
                            title: '📅 Friday Attendance Check',
                            body: 'It\'s Friday! Don\'t forget to mark your attendance and review your weekly attendance record.'
                        }
                    });
                    
                    // Also try to send push notification
                    if (messaging) {
                        sendPushNotification();
                    }
                }
            }, 60000); // Check every minute
        }

        // Send push notification via Firebase (requires server-side for actual push)
        async function sendPushNotification() {
            try {
                const db = firebase.database();
                // Store notification request in database
                await db.ref('notifications').push({
                    type: 'friday_reminder',
                    scheduledFor: Date.now(),
                    sent: false
                });
                console.log('Push notification scheduled');
            } catch (error) {
                console.error('Error scheduling push notification:', error);
            }
        }

        // Check auth state
        firebase.auth().onAuthStateChanged(async user => {
            if (!user) {
                window.location.href = 'login';
                return;
            }

            currentUser = user;
            const db = firebase.database();
            const userRef = db.ref(`users/${user.uid}`);
            const snapshot = await userRef.once('value');
            const userData = snapshot.val();

            document.getElementById('userInfo').textContent = 
                (userData?.role === 'admin' ? 'Admin' : 'Student') + ' - ' + (userData?.name || user.email);

            // Initialize push notifications (for non-admin users)
            if (userData?.role !== 'admin') {
                initNotifications();
            }

            // Hide skeleton, show content
            document.getElementById('skeletonLoader').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';

            if (userData?.role === 'admin') {
                document.getElementById('studentView').style.display = 'none';
                document.getElementById('adminView').style.display = 'block';
                loadAdminDashboard();
            } else {
                document.getElementById('adminView').style.display = 'none';
                document.getElementById('studentView').style.display = 'block';
                loadStudentDashboard();
            }
        });

        // Initialize Leaflet map
        function initMap() {
            if (map) return;
            map = L.map('map').setView([0, 0], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);
        }

        // Update map with admin and user locations
        async function updateMapLocations() {
            if (!currentSession || !currentSession.active) return;
            initMap();
            const db = firebase.database();
            // Get admin location from session
            if (currentSession.adminLat && currentSession.adminLng) {
                if (adminMarker) {
                    adminMarker.setLatLng([currentSession.adminLat, currentSession.adminLng]);
                } else {
                    adminMarker = L.marker([currentSession.adminLat, currentSession.adminLng], {
                        icon: L.divIcon({ className: 'admin-marker', html: '<div style="background:#e74c3c; width:20px; height:20px; border-radius:50%; border:3px solid #fff; box-shadow:0 2px 5px rgba(0,0,0,0.3);"></div>', iconSize: [20, 20] })
                    }).addTo(map).bindPopup('Admin Location');
                }
                map.setView([currentSession.adminLat, currentSession.adminLng], 15);
            }
            // Get user locations from attendance
            const attendanceSnap = await db.ref(`attendance/${currentSession.id}`).once('value');
            const attendance = attendanceSnap.val() || {};
            for (const [uid, record] of Object.entries(attendance)) {
                if (record.lat && record.lng) {
                    if (userMarkers[uid]) {
                        userMarkers[uid].setLatLng([record.lat, record.lng]);
                    } else {
                        userMarkers[uid] = L.marker([record.lat, record.lng], {
                            icon: L.divIcon({ className: 'user-marker', html: '<div style="background:#3498db; width:16px; height:16px; border-radius:50%; border:2px solid #fff; box-shadow:0 2px 5px rgba(0,0,0,0.3);"></div>', iconSize: [16, 16] })
                        }).addTo(map).bindPopup(`User: ${uid.substring(0, 8)}...`);
                    }
                }
            }
        }

        // Start map polling for admin
        function startMapPolling() {
            setInterval(() => {
                if (currentSession && currentSession.active) {
                    updateMapLocations();
                }
            }, 3000);
        }

        async function loadStudentDashboard() {
            try {
                const db = firebase.database();
                const attendanceRef = db.ref('attendance');
                const snapshot = await attendanceRef.once('value');
                const allAttendance = snapshot.val() || {};
                
                // Get sessions info for more details
                const sessionsSnap = await db.ref('sessions').once('value');
                const sessions = sessionsSnap.val() || {};

                const history = [];
                Object.entries(allAttendance).forEach(([sessionId, session]) => {
                    if (session && session[currentUser.uid]) {
                        const record = session[currentUser.uid];
                        const sessionInfo = sessions[sessionId] || {};
                        history.push({
                            sessionId: sessionId,
                            date: new Date(record.timestamp).toLocaleDateString(),
                            time: new Date(record.timestamp).toLocaleTimeString(),
                            fullDate: new Date(record.timestamp),
                            sessionDate: sessionInfo.startTime ? new Date(sessionInfo.startTime).toLocaleDateString() : 'Unknown'
                        });
                    }
                });

                // Sort by date (newest first)
                history.sort((a, b) => b.fullDate - a.fullDate);

                const historyDiv = document.getElementById('attendanceHistory');
                
                if (history.length > 0) {
                    // Group by month for better organization
                    const groupedByMonth = {};
                    history.forEach(h => {
                        const monthKey = h.fullDate.toLocaleString('default', { month: 'long', year: 'numeric' });
                        if (!groupedByMonth[monthKey]) {
                            groupedByMonth[monthKey] = [];
                        }
                        groupedByMonth[monthKey].push(h);
                    });
                    
                    let html = `<div style="margin-bottom: 15px; color: #4e8cff; font-weight: bold;">Total Attendance: ${history.length} sessions</div>`;
                    
                    for (const [month, records] of Object.entries(groupedByMonth)) {
                        html += `<div style="margin-top: 15px;"><strong style="color: #aaa;">${month}</strong></div>`;
                        records.forEach(h => {
                            html += `<div class="attendance-item" style="display: flex; justify-content: space-between; align-items: center; padding: 12px; margin: 8px 0; background: #2a2a2a; border-radius: 8px; border-left: 4px solid #43a047;">
                                <div>
                                    <span style="color: #43a047; font-size: 18px;">✓</span>
                                    <span style="font-weight: bold; color: #fff;">${h.date}</span>
                                </div>
                                <div style="color: #aaa; font-size: 13px;">
                                    ${h.time}
                                </div>
                            </div>`;
                        });
                    }
                    historyDiv.innerHTML = html;
                } else {
                    historyDiv.innerHTML = '<p style="color: #999; text-align: center; padding: 20px;">No attendance records yet</p>';
                }
                
                // Enable download button for student's own attendance
                document.getElementById('downloadMyAttendanceBtn').onclick = () => downloadMyAttendance(history);
            } catch (error) {
                console.error('Error loading history:', error);
            }
        }

        // Download student's own attendance
        function downloadMyAttendance(history) {
            if (history.length === 0) {
                alert('No attendance records to download.');
                return;
            }
            let csv = 'Date,Time\n';
            history.forEach(h => {
                csv += `${h.date},${h.time}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `my_attendance_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        async function markAttendance(event) {
            event.preventDefault();
            const token = document.getElementById('sessionToken').value.trim();

            // Check if geolocation is available
            if (!navigator.geolocation) {
                alert('Geolocation is not supported by your browser. Attendance cannot be marked.');
                return;
            }

            // Get user location
            navigator.geolocation.getCurrentPosition(async (position) => {
                // Maximum distance in meters (extended to 50km)
                const maxDistance = 50000;
                try {
                    const db = firebase.database();
                    const sessionsRef = db.ref('sessions');
                    const snapshot = await sessionsRef.once('value');
                    const sessions = snapshot.val() || {};

                    let session = null;
                    let sessionId = null;
                    for (const [id, s] of Object.entries(sessions)) {
                        if (s && s.token === token && s.active) {
                            session = s;
                            sessionId = id;
                            break;
                        }
                    }

                    if (!session) {
                        alert('Invalid or inactive session token');
                        return;
                    }

                    // Check distance from admin
                    if (session.adminLat && session.adminLng) {
                        const distance = getDistance(
                            position.coords.latitude, position.coords.longitude,
                            session.adminLat, session.adminLng
                        );
                        if (distance > maxDistance) {
                            alert(`You are too far from the admin (${Math.round(distance)}m). Must be within ${maxDistance}m.`);
                            return;
                        }
                    }

                    // Check if already marked attendance for this session
                    const existingAttendance = await db.ref(`attendance/${sessionId}/${currentUser.uid}`).once('value');
                    if (existingAttendance.exists()) {
                        alert('You have already marked attendance for this session!');
                        return;
                    }

                    // Get device fingerprint
                    const deviceId = getDeviceFingerprint();

                    // Check if this device already marked attendance (prevent device fraud)
                    const deviceAttendanceRef = db.ref('attendance/' + sessionId);
                    const allAttendance = await deviceAttendanceRef.once('value');
                    for (const [uid, record] of Object.entries(allAttendance.val() || {})) {
                        if (record.deviceId === deviceId && uid !== currentUser.uid) {
                            alert('This device has already been used to mark attendance by another user.');
                            return;
                        }
                    }

                    await db.ref(`attendance/${sessionId}/${currentUser.uid}`).set({
                        timestamp: Date.now(),
                        deviceId: deviceId,
                        lat: position.coords.latitude,
                        lng: position.coords.longitude,
                        ip: null // Note: IP requires server-side capture
                    });

                    alert('✓ Attendance marked!');
                    document.getElementById('sessionToken').value = '';
                    loadStudentDashboard();
                } catch (error) {
                    alert('Error: ' + error.message);
                }
            }, (error) => {
                alert('Location error: ' + error.message + '. Please enable location access to mark attendance.');
            });
        }

        async function loadAdminDashboard() {
            try {
                await addDefaultAttendanceIfNeeded();
                const db = firebase.database();
                const sessionsRef = db.ref('sessions');
                const snapshot = await sessionsRef.once('value');
                const sessions = snapshot.val() || {};

                const activeSessions = Object.entries(sessions).find(([_, s]) => s && s.active);
                if (activeSessions) {
                    currentSession = { id: activeSessions[0], ...activeSessions[1] };
                    displaySessionStatus();
                    loadLiveAttendance();
                    startAttendancePolling();
                    startMapPolling();
                    // Enable download buttons
                    document.getElementById('downloadAttendanceBtn').onclick = downloadAttendanceCSV;
                } else {
                    displayNoSession();
                }
                
                // Always enable "Download All Attendance" button (works even without active session)
                document.getElementById('downloadAllAttendanceBtn').onclick = downloadAllAttendanceCSV;

                // Load department attendance cards (lazy loaded)
                setTimeout(async () => {
                    await loadDepartmentAttendanceCards();
                }, 500);
            } catch (error) {
                console.error('Error loading admin dashboard:', error);
            }
        }

        // Load department cards for admin view
        async function loadDepartmentAttendanceCards() {
            const db = firebase.database();
            const usersSnap = await db.ref('users').once('value');
            const users = usersSnap.val() || {};
            // Collect unique departments
            const departments = {};
            Object.values(users).forEach(u => {
                if (u.department) {
                    departments[u.department] = true;
                }
            });
            const departmentList = Object.keys(departments);
            const cardsDiv = document.getElementById('departmentAttendanceCards');
            cardsDiv.innerHTML = '';
            departmentList.forEach(dept => {
                const card = document.createElement('div');
                card.className = 'department-card';
                card.style = 'background:#222; color:#fff; border-radius:10px; padding:20px; min-width:250px; margin-bottom:10px; box-shadow:0 2px 8px #0002; flex:1 1 300px; max-width:350px;';
                card.innerHTML = `
                    <h4 style="margin-bottom:10px; color:#4e8cff;"><span style='font-size:2em;'>📘</span> ${dept}</h4>
                    <div style='font-size:13px; color:#aaa; margin-bottom:8px;'>Department</div>
                    <button onclick="viewDepartmentAttendance('${dept.replace(/'/g, "\\'")}")" style='background:#1976d2; color:#fff; border:none; border-radius:4px; padding:8px 16px; margin-right:8px; cursor:pointer;'>👁️ View Attendance</button>
                    <button onclick="downloadDepartmentAttendance('${dept.replace(/'/g, "\\'")}")" style='background:#43a047; color:#fff; border:none; border-radius:4px; padding:8px 16px; cursor:pointer;'>⬇️ Download as Document</button>
                `;
                cardsDiv.appendChild(card);
            });
        }

        // Show modal with department attendance table
        async function viewDepartmentAttendance(department) {
            try {
                console.log('Viewing attendance for department:', department);
                const db = firebase.database();
                const usersSnap = await db.ref('users').once('value');
                const users = usersSnap.val() || {};
                const attendanceSnap = await db.ref('attendance').once('value');
                const allAttendance = attendanceSnap.val() || {};
                console.log('Users:', users);

        // Download attendance as CSV
        async function downloadAttendanceCSV() {
            if (!currentSession || !currentSession.id) {
                alert('No active session to download attendance from.');
                return;
            }
            try {
                const db = firebase.database();
                const attendanceRef = db.ref('attendance/' + currentSession.id);
                const snapshot = await attendanceRef.once('value');
                const attendance = snapshot.val() || {};
                let csv = 'Matric No,Name,Department,Email,Timestamp,Latitude,Longitude\n';

                const a = document.createElement('a');
                a.href = url;
                a.download = `attendance_${currentSession.token}.csv`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

        // Download ALL attendance (including past sessions)
        async function downloadAllAttendanceCSV() {
            try {
                const db = firebase.database();
                const attendanceRef = db.ref('attendance');
                const snapshot = await attendanceRef.once('value');
                const allAttendance = snapshot.val() || {};
                
                // Get all users for name lookup
                const usersSnap = await db.ref('users').once('value');
                const users = usersSnap.val() || {};
                
                // Get all sessions for date lookup
                const sessionsSnap = await db.ref('sessions').once('value');
                const sessions = sessionsSnap.val() || {};

                let csv = 'Session ID,Session Date,Matric No,Name,Department,Email,Timestamp,Latitude,Longitude\n';
                
                for (const [sessionId, sessionAttendance] of Object.entries(allAttendance)) {
                    const session = sessions[sessionId] || {};
                    const sessionDate = session.startTime ? new Date(session.startTime).toLocaleDateString() : sessionId;
                    
                    for (const [uid, record] of Object.entries(sessionAttendance)) {
                        const user = users[uid] || {};
                        const timestamp = record.timestamp ? new Date(record.timestamp).toLocaleString() : '';
                        csv += `${sessionId},${sessionDate},${user.matricNo || ''},${user.name || ''},${user.department || ''},${user.email || ''},${timestamp},${record.lat || ''},${record.lng || ''}\n`;
                    }

                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `all_attendance_${new Date().toISOString().split('T')[0]}.csv`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

        function displaySessionStatus() {
            const statusDiv = document.getElementById('sessionStatus');
            statusDiv.innerHTML = `<div class="session-status">✓ Session Active | Token: <strong>${currentSession.token}</strong></div>`;

            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('endBtn').style.display = 'block';
            document.getElementById('qrSection').style.display = 'block';

            // QR code now encodes only the session token
            const qrToken = currentSession.token;
            const qrContainer = document.getElementById('qrCode');
            
            if (typeof QRCode !== 'undefined' && typeof QRCode.toDataURL === 'function') {
                // Clear previous QR code
                qrContainer.src = '';
                qrContainer.alt = 'Generating...';
                
                try {
                    QRCode.toDataURL(qrToken, { width: 256, margin: 1 }, (err, url) => {
                        if (err) {
                            console.error('QR Code generation error:', err, 'Token:', qrToken);
                            qrContainer.alt = 'QR generation failed';
                        } else {
                            qrContainer.src = url;
                            qrContainer.alt = 'QR Code';
                        }
                    });
                } catch (err) {
                    console.error('QR Code generation error:', err, 'Token:', qrToken);
                    qrContainer.alt = 'QR generation failed';
                }
            } else {
                qrContainer.alt = 'QR Code library not loaded';
                console.error('QRCode.js is not loaded!');
            }
        }

        function displayNoSession() {
            const statusDiv = document.getElementById('sessionStatus');
            statusDiv.innerHTML = '<p style="color: #999;">No active session</p>';
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('endBtn').style.display = 'none';
            document.getElementById('qrSection').style.display = 'none';

        // Get admin's location when starting session
        async function startSession() {
            if (!navigator.geolocation) {
                alert('Geolocation is not supported. Cannot start session.');
                return;
            }

            navigator.geolocation.getCurrentPosition(async (position) => {
                try {
                    const db = firebase.database();
                    const token = Math.random().toString(36).substring(2, 11);
                    const startTime = Date.now();
                    const durationMinutes = parseInt(document.getElementById('sessionDuration').value) || 30;
                    const endTime = startTime + (durationMinutes * 60 * 1000);

                    // Get device fingerprint
                    const deviceId = getDeviceFingerprint();

                    const newSessionRef = db.ref('sessions').push();
                    await newSessionRef.set({
                        token: token,
                        startTime: startTime,
                        endTime: endTime,
                        active: true,
                        // Save admin's location
                        adminLat: position.coords.latitude,
                        adminLng: position.coords.longitude,
                        // Device info
                        adminDeviceId: deviceId
                    });

                    currentSession = { id: newSessionRef.key, token, startTime, endTime, active: true };
                    displaySessionStatus();
                    startAttendancePolling();
                    alert(`Session started! Valid for ${durationMinutes} minutes. Your location is saved.`);
                } catch (error) {
                    alert('Error starting session: ' + error.message);
                }
            }, (error) => {
                alert('Location error: ' + error.message + '. Please enable location to start session.');
            });
        }

        // Calculate distance between two coordinates (in meters)
        function getDistance(lat1, lng1, lat2, lng2) {
            const R = 6371000; // Earth's radius in meters
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLng/2) * Math.sin(dLng/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // Get device fingerprint
        function getDeviceFingerprint() {
            const nav = navigator.userAgent;
            const screenSize = `${window.screen.width}x${window.screen.height}`;
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            const language = navigator.language;
            const platform = navigator.platform;
            // Simple hash of device info
            const info = `${nav}|${screenSize}|${timezone}|${language}|${platform}`;
            let hash = 0;
            for (let i = 0; i < info.length; i++) {
                const char = info.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return 'device_' + Math.abs(hash).toString(16);
        }

        async function endSession() {
            try {
                const db = firebase.database();
                await db.ref(`sessions/${currentSession.id}`).update({ active: false });
                currentSession = null;
                displayNoSession();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        function startAttendancePolling() {
            const interval = setInterval(() => {
                if (!currentSession || !currentSession.active) {
                    clearInterval(interval);
                    return;
                }
                loadLiveAttendance();
            }, 2000);
        }

        async function loadLiveAttendance() {
            if (!currentSession) return;

            try {
                const db = firebase.database();
                const attendanceRef = db.ref(`attendance/${currentSession.id}`);
                const snapshot = await attendanceRef.once('value');
                const attendance = snapshot.val() || {};

                const list = document.getElementById('attendanceList');
                const items = Object.entries(attendance).map(([uid, record]) => {
                    const date = new Date(record.timestamp);
                    const isLate = record.timestamp > (currentSession.startTime + 5 * 60 * 1000);
                    return `<div class="attendance-item ${isLate ? 'late' : ''}">
                        ✓ ${uid.substring(0, 8)}... | ${date.toLocaleTimeString()}
                    </div>`;
                });

                document.getElementById('attendanceCount').textContent = items.length;
                list.innerHTML = items.length > 0 ? items.join('') : '<p style="color: #999;">Waiting for attendance...</p>';
            } catch (error) {
                console.error('Error loading attendance:', error);
            }
        }

            try {
                await firebase.auth().signOut();
                window.location.href = 'login';
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        // Automatically add default attendance for all users for specific dates if not already present
        async function addDefaultAttendanceIfNeeded() {
            const db = firebase.database();
            const usersSnap = await db.ref('users').once('value');
            const users = usersSnap.val() || {};
            
            // Use explicit timestamps for the 3 dates
            // 27th March 2026, 10th April 2026, 17th April 2026 at 9:00 AM
            const dates = [
                { date: new Date(2026, 2, 27, 9, 0, 0).getTime(), label: 'March 27, 2026' },
                { date: new Date(2026, 3, 10, 9, 0, 0).getTime(), label: 'April 10, 2026' },
                { date: new Date(2026, 3, 17, 9, 0, 0).getTime(), label: 'April 17, 2026' }
            ];
            
            console.log('Adding default attendance for dates:', dates.map(d => d.label));
            
            // Check if sessions for these dates already exist (by startTime and defaultSession flag)
            const sessionsSnap = await db.ref('sessions').once('value');
            const sessions = sessionsSnap.val() || {};
            const existingDates = new Set();
            Object.values(sessions).forEach(s => {
                if (s && s.defaultSession) {
                    dates.forEach(d => {
                        if (s.startTime === d.date) {
                            existingDates.add(d.date);
                        }
                    });
                }
            });
            
            console.log('Existing default dates:', existingDates);
            
            for (const d of dates) {
                if (!existingDates.has(d.date)) {
                    console.log('Creating session for:', d.label);
                    // Create a session for this date
                    const sessionRef = db.ref('sessions').push();
                    const sessionId = sessionRef.key;
                    await sessionRef.set({
                        token: Math.random().toString(36).substring(2, 11),
                        startTime: d.date,
                        endTime: d.date + 60 * 60 * 1000, // 1 hour session
                        active: false,
                        adminLat: 0,
                        adminLng: 0,
                        adminDeviceId: 'default',
                        defaultSession: true,
                        topic: d.label
                    });
                    
                    // Add attendance for all users (except admin)
                    const userCount = Object.entries(users).filter(([uid, user]) => user.role !== 'admin').length;
                    console.log(`Adding attendance for ${userCount} users for ${d.label}`);
                    
                    for (const [uid, user] of Object.entries(users)) {
                        if (user.role !== 'admin') {
                            await db.ref(`attendance/${sessionId}/${uid}`).set({
                                timestamp: d.date + Math.floor(Math.random() * 1800000), // random time within 30 min
                                deviceId: 'default',
                                lat: '',
                                lng: '',
                                ip: ''
                            });
                        }
                    }
                }
            }
            console.log('Default attendance setup complete');
        }
