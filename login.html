<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-wrapper">
        <div class="card">
            <div class="card-header">
                <div class="icon-container">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                </div>
                <h1>University Attendance</h1>
                <p>Sign in to continue</p>
            </div>

            <div class="role-toggle">
                <button type="button" id="studentBtn" class="role-btn active" onclick="setRole('student')">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    Student
                </button>
                <button type="button" id="adminBtn" class="role-btn admin" onclick="setRole('admin')">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    Admin
                </button>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group" id="matricGroup">
                    <label for="matricNo">Matric Number</label>
                    <input id="matricNo" name="matricNo" type="text" placeholder="e.g., BIU/2023 or SCN/CSC" required>
                </div>

                <div class="form-group" id="passwordGroup">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" placeholder="Enter password">
                </div>

                <button type="submit" class="btn-primary">Sign In</button>
            </form>

            <div id="adminGoogleSignIn" class="form-group" style="display:none; text-align:center; margin-top:16px;">
                <button type="button" class="btn-primary" onclick="handleAdminGoogleSignIn()">
                    Sign in with Google
                </button>
            </div>

            <div class="divider">
                <span>or</span>
            </div>

            <div class="links">
                <a onclick="goToRegister()">Don't have an account? Register</a>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-database-compat.js"></script>
    <script src="auth.js"></script>
    <script>
        let currentRole = 'student';
        
        function setRole(role) {
            currentRole = role;
            const studentBtn = document.getElementById('studentBtn');
            const adminBtn = document.getElementById('adminBtn');
            const loginForm = document.getElementById('loginForm');
            const adminGoogleSignIn = document.getElementById('adminGoogleSignIn');
            
            if (role === 'student') {
                studentBtn.classList.add('active');
                adminBtn.classList.remove('active');
                loginForm.style.display = 'block';
                adminGoogleSignIn.style.display = 'none';
            } else {
                studentBtn.classList.remove('active');
                adminBtn.classList.add('active');
                loginForm.style.display = 'none';
                adminGoogleSignIn.style.display = 'block';
            }
        }

        function goToRegister() {
            window.location.href = 'register.html';
        }

        async function handleLogin(event) {
            event.preventDefault();
            const loginType = currentRole;
            const matricNo = document.getElementById('matricNo').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');

            errorDiv.classList.remove('show');

            try {
                if (loginType !== 'student') {
                    throw new Error('Use the Google sign-in button for admin login');
                }

                if (!password) {
                    throw new Error('Password is required for student login');
                }
                
                // Check if this is the test account
                if (matricNo.toLowerCase() === 'test001' && password === 'Test@123') {
                    await ensureTestAccount();
                    window.location.href = 'dashboard.html';
                    return;
                }
                
                const email = sanitizeEmail(matricNo);
                const pwd = password;

                const userCredential = await firebase.auth().signInWithEmailAndPassword(email, pwd);
                
                // Ensure user record exists in database
                await ensureUserRecord(userCredential.user, 'student', '');
                
                window.location.href = 'dashboard.html';
            } catch (error) {
                console.error('Login error:', error);
                let errorMsg = error.message;
                if (error.code) {
                    errorMsg += ' (code: ' + error.code + ')';
                }
                showError(errorDiv, errorMsg);
            }
        }

        async function handleAdminGoogleSignIn() {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.classList.remove('show');

            try {
                console.log('Starting admin login with Google...');
                await signInWithGoogle('admin');
                console.log('Admin login successful, redirecting...');
                window.location.href = 'dashboard.html';
            } catch (error) {
                console.error('Admin login error:', error);
                let errorMsg = error.message;
                if (error.code) {
                    errorMsg += ' (code: ' + error.code + ')';
                }
                showError(errorDiv, errorMsg);
            }
        }

        function showError(element, message) {
            element.textContent = message;
            element.classList.add('show');
        }

        function updateLoginForm() {
            setRole(currentRole);
        }

        updateLoginForm();
    </script>
</body>
</html>
