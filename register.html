<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance - Register</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-wrapper">
        <div class="card">
            <div class="card-header">
                <div class="icon-container indigo">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
                </div>
                <h1>Create Account</h1>
                <p>Join the attendance system</p>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="regName">Full Name</label>
                    <input id="regName" name="regName" type="text" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="regMatricNo">Matric Number</label>
                    <input id="regMatricNo" name="regMatricNo" type="text" placeholder="e.g., BIU/2023" required>
                </div>

                <div class="form-group">
                    <label for="regDepartment">Department</label>
                    <select id="regDepartment" name="regDepartment" required>
                        <option value="">Select Department</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Nursing">Nursing</option>
                        <option value="Medicine and Surgery">Medicine and Surgery</option>
                        <option value="Med Lab">Med Lab</option>
                        <option value="Agric">Agric</option>
                        <option value="Engineering">Engineering</option>
                        <option value="Anatomy">Anatomy</option>
                        <option value="Bio Chemistry">Bio Chemistry</option>
                        <option value="Micro Biology">Micro Biology</option>
                        <option value="Geo Physics">Geo Physics</option>
                        <option value="Physiology">Physiology</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input id="regPassword" name="regPassword" type="password" placeholder="At least 6 characters" required>
                </div>

                <button type="submit" class="btn-primary">Create Account</button>
            </form>

            <div class="links">
                <a onclick="goToLogin()">← Back to Login</a>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-database-compat.js"></script>
    <script src="auth.js"></script>
    <script>
        function goToLogin() {
            window.location.href = 'login.html';
        }

        async function handleRegister(event) {
            event.preventDefault();
            const name = document.getElementById('regName').value;
            const matricNo = document.getElementById('regMatricNo').value.trim();
            const department = document.getElementById('regDepartment').value;
            const password = document.getElementById('regPassword').value;
            const errorDiv = document.getElementById('errorMessage');

            errorDiv.classList.remove('show');

            if (!department) {
                showError(errorDiv, 'Please select a department');
                return;
            }

            if (password.length < 6) {
                showError(errorDiv, 'Password must be at least 6 characters');
                return;
            }

            try {
                const email = sanitizeEmail(matricNo);
                const result = await firebase.auth().createUserWithEmailAndPassword(email, password);

                // Save user record with department
                const db = firebase.database();
                await db.ref(`users/${result.user.uid}`).set({
                    matricNo: matricNo.toLowerCase(),
                    name: name,
                    email: email,
                    role: 'student',
                    department: department
                });

                alert('Account created! Redirecting to dashboard...');
                window.location.href = 'dashboard.html';
            } catch (error) {
                showError(errorDiv, error.message);
            }
        }

        function showError(element, message) {
            element.textContent = message;
            element.classList.add('show');
        }
    </script>
</body>
</html>
